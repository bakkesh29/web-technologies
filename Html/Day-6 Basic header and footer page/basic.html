<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .my-box {
            /* Styling the box */
            border: 2px solid #333;
            /* Dark border */
            background-color: #f4f4f4;
            /* Light gray background */
            padding: 20px;
            /* Space inside the box */
            width: 300px;
            /* Box width */
            border-radius: 8px;
            /* Rounded corners */
            margin: 20px auto;
            /* Centers the box on the page */
            font-family: Arial, sans-serif;
        }

        .my-box p {
            /* Styling the paragraph inside the box */
            color: #555;
            line-height: 1.6;
        }
    </style>
    <title>Basic HTML Box</title>
</head>

<body>

    <div class="my-box">
        <p>This is a paragraph inside a styled box. You can add more text here to see how it fits within the container.
        </p>
    </div>

</body>

</html>
